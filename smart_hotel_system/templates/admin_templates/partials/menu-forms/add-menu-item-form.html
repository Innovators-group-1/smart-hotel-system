<!-- Add Menu Item Modal Content (NO overlay, NO container) -->
<div class="w-full max-w-2xl mx-auto bg-white rounded-2xl shadow-xl animate-fadeIn">

    <!-- Header -->
    <div class="px-6 py-4 border-b flex items-center justify-between">
        <h2 class="text-xl font-semibold text-gray-900">Add New Menu Item</h2>

        <button 
            onclick="closeModal()"
            class="text-gray-500 hover:text-gray-700 text-lg"
        >
            ✕
        </button>
    </div>

    <!-- FORM -->
    <form 
        hx-post="{% url 'add_menu_item' %}"
        hx-target="#menu-table-body"
        hx-swap="innerHTML"
        enctype="multipart/form-data"
        class="px-6 py-6 space-y-6"
    >

        <!-- Item Name -->
        <div>
            <label class="text-sm font-medium">Item Name</label>
            <input 
                type="text"
                name="name"
                placeholder="e.g. Classic Cheeseburger"
                class="mt-1 w-full rounded-xl border px-4 py-3 focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <!-- Description -->
        <div>
            <label class="text-sm font-medium">Description</label>
            <textarea 
                name="description"
                rows="3"
                placeholder="Enter a short description for the menu item"
                class="mt-1 w-full rounded-xl border px-4 py-3 focus:ring-2 focus:ring-blue-500"
            ></textarea>
        </div>

        <!-- Category + Price -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Category -->
            <div>
                <label class="text-sm font-medium">Category</label>
                <select 
                    name="category"
                    class="mt-1 w-full rounded-xl border px-4 py-3 focus:ring-2 focus:ring-blue-500"
                    required
                >
                    <option value="">Select a category</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Price -->
            <div>
                <label class="text-sm font-medium">Price</label>
                <input 
                    type="number"
                    step="0.01"
                    name="price"
                    placeholder="$ 12.99"
                    class="mt-1 w-full rounded-xl border px-4 py-3 focus:ring-2 focus:ring-blue-500"
                    required
                >
            </div>
        </div>

        <!-- Upload Image -->
        <div>
            <label class="text-sm font-medium">Upload Image</label>

            <div class="mt-2 flex items-center gap-4">

                <!-- Preview -->
                <img 
                    id="preview-image" 
                    src="/static/img/placeholder.png"
                    class="w-20 h-20 rounded-xl object-cover border"
                >

                <!-- Upload Button -->
                <label class="cursor-pointer">
                    <div class="px-4 py-2 bg-blue-50 text-blue-700 border rounded-xl hover:bg-blue-100">
                        Click to upload or drag & drop
                    </div>
                    <input 
                        type="file" 
                        name="image"
                        id="image-upload"
                        class="hidden"
                        accept="image/*"
                        required
                    >
                </label>

            </div>

            <p class="text-xs text-gray-500">PNG, JPG, GIF up to 5MB.</p>
        </div>

        <!-- Availability -->
        <div>
            <label class="text-sm font-medium">Availability</label>

            <div class="mt-2 border rounded-xl px-4 py-3 flex items-center justify-between">

                <span>Item is available for order</span>

                <label class="inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="available" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-300 rounded-full peer-checked:bg-blue-600 relative transition">
                        <div class="w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 peer-checked:translate-x-5 transition"></div>
                    </div>
                </label>
            </div>
        </div>

        <!-- Footer Buttons -->
        <div class="flex justify-end gap-3 pt-4 border-t">
            <button 
                type="button"
                onclick="closeModal()"
                class="px-5 py-2 bg-white border rounded-xl hover:bg-gray-50"
            >
                Cancel
            </button>

            <button 
                type="submit"
                class="px-6 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700"
            >
                Save Item
            </button>
        </div>

    </form>
</div>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: scale(.98); }
    to { opacity: 1; transform: scale(1); }
}
.animate-fadeIn { animation: fadeIn .2s ease-out; }
</style>

<script>
document.getElementById("image-upload")?.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    document.getElementById("preview-image").src = URL.createObjectURL(file);
});
</script>
