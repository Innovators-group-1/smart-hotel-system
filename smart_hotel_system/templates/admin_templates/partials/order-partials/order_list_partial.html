{% for order in orders %}
<tr class="hover:bg-gray-50 transition-colors duration-200 border-b border-gray-200">
  <!-- Order ID -->
  <td class="px-6 py-4 font-semibold text-gray-800">
    #{{ order.order_id }}
  </td>

  <!-- Table -->
  <td class="px-6 py-4 text-gray-700">
    {{ order.table }}
  </td>

  <!-- Created At -->
  <td class="px-6 py-4 text-sm text-gray-500">
    {{ order.created_at|date:"M d, Y H:i" }}
  </td>

  <!-- Total Price -->
  <td class="px-6 py-4 font-medium text-gray-900">
    <span class="text-gray-600">KSH</span> {{ order.total_price|floatformat:2 }}
  </td>

  <!-- Payment Status -->
  <td class="px-6 py-4">
    <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold tracking-wide
      {% if order.payment_status == 'PAID' %} bg-green-100 text-green-700
      {% elif order.payment_status == 'UNPAID' %} bg-yellow-100 text-yellow-700
      {% elif order.payment_status == 'FAILED' %} bg-red-100 text-red-700
      {% endif %}
    ">
      {{ order.payment_status }}
    </span>
  </td>

  <!-- Order Status -->
  <td class="px-6 py-4">
    <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold tracking-wide
      {% if order.status == 'COMPLETED' %} bg-emerald-100 text-emerald-700
      {% elif order.status == 'PENDING' %} bg-amber-100 text-amber-700
      {% elif order.status == 'IN_PROGRESS' %} bg-blue-100 text-blue-700
      {% elif order.status == 'CANCELLED' %} bg-red-100 text-red-700
      {% endif %}
    ">
      {{ order.get_status_display }}
    </span>
  </td>

  <!-- Actions -->
  <td class="px-6 py-4 text-right">
    <button 
      class="inline-flex items-center gap-1 text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors"
      hx-get="{% url 'order_details_partial' order.pk %}"
      hx-target="#order-details-{{ order.pk }}"
      hx-swap="outerHTML"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12H9m12 0a9 9 0 11-18 0a9 9 0 0118 0z" />
      </svg>
      View Details
    </button>
  </td>
</tr>

<!-- Expandable Details Row -->
<tr id="order-details-{{ order.pk }}" class="hidden"></tr>
{% endfor %}
