<tr id="order-details-{{ order.pk }}" class="bg-gray-50 transition-all duration-300 ease-in-out">
  <td colspan="6" class="px-6 py-4">
    <div class="space-y-4">
      <!-- Ordered Items -->
      <div>
        <h4 class="text-sm font-semibold text-gray-700 mb-2">Items</h4>
        <ul class="space-y-1">
          <li class="flex justify-between text-sm text-gray-600">
            <span>{{ order.quantity }}x {{ order.menu_item.title }}</span>
            <span class="font-medium">{{ order.total_price|floatformat:2 }}</span>
          </li>
        </ul>
      </div>

      <!-- Notes -->
      {% if order.special_requests %}
      <div>
        <h4 class="text-sm font-semibold text-gray-700 mb-2">Notes</h4>
        <p class="text-sm text-gray-600">{{ order.special_requests }}</p>
      </div>
      {% endif %}

      <!-- Actions -->
      <div class="flex flex-wrap gap-2">
        <button 
          class="px-3 py-1 rounded bg-green-100 text-green-700 hover:bg-green-200 transition"
          hx-post="{% url 'verify_payment' order.pk %}"
          hx-target="#orders-table-body"
          hx-swap="innerHTML"
        >
          Verify Payment
        </button>
        <button 
          class="px-3 py-1 rounded bg-blue-100 text-blue-700 hover:bg-blue-200 transition"
          hx-post="{% url 'send_to_kitchen' order.pk %}"
          hx-target="#orders-table-body"
          hx-swap="innerHTML"
        >
          Send to Kitchen
        </button>
        <button 
          class="px-3 py-1 rounded bg-gray-100 text-gray-700 hover:bg-gray-200 transition"
          hx-get="{% url 'print_receipt' order.pk %}"
          hx-target="#orders-table-body"
          hx-swap="innerHTML"
        >
          Print Receipt
        </button>
        <button 
          class="px-3 py-1 rounded bg-red-100 text-red-700 hover:bg-red-200 transition"
          hx-post="{% url 'cancel_order' order.pk %}"
          hx-target="#orders-table-body"
          hx-swap="innerHTML"
        >
          Cancel Order
        </button>
      </div>

      <!-- Metadata -->
      <div class="text-xs text-gray-500">
        Placed at {{ order.created_at }} | Order ID: {{ order.order_id }}
      </div>
    </div>
  </td>
</tr>
