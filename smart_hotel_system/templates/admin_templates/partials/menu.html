<!-- MAIN CONTENT -->
<div class="p-6 space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Menu Management</h1>

    <div class="flex items-center gap-3">

      <!-- Add New Item -->
      <button 
        class="px-4 py-2 bg-blue-600 text-white rounded-xl shadow-md
               hover:bg-blue-700 hover:shadow-lg active:scale-95
               transition-all duration-200 flex items-center gap-2"
        hx-get="{% url 'add_menu_item' %}"
        hx-target="#modal-content"
        onclick="openModal()"
      >
        + Add New Item
      </button>

      <!-- Add In-built Food -->
      <button 
        class="px-4 py-2 bg-blue-50 text-blue-700 rounded-xl shadow-md
               hover:bg-blue-100 hover:shadow-lg active:scale-95 transition-all duration-200"
        hx-get="{% url 'add_inbuilt_menu_item' %}"
        hx-target="#modal-content"
        onclick="openModal()"
      >
        + Add In-built Food
      </button>

    </div>
  </div>

  <!-- In-built Food Catalog -->
  <div id="builtin-catalog"
       class="bg-white rounded-2xl border border-gray-200 p-6 shadow-xl transition-all">

    <div class="flex justify-between items-center">
      <h2 class="text-xl font-semibold text-gray-800">In-built Food Catalog</h2>

      <button 
        class="text-gray-400 hover:text-gray-600 hover:scale-110 transition"
        onclick="document.getElementById('builtin-catalog').style.display='none'"
      >
        ✕
      </button>
    </div>

    <!-- Search Catalog -->
    <div class="relative mt-4 group">
      <input 
        type="text"
        placeholder="Search catalog..."
        class="w-full rounded-xl border border-gray-300 pl-10 py-2 shadow-sm
               focus:ring-2 focus:ring-blue-500 focus:outline-none
               transition-all duration-200 group-hover:shadow-md"
      >
      <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5 group-hover:opacity-80 transition" 
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-4.35-4.35m0 0A7.5 7.5 7.5 7.5 0 1010.5 18a7.5 7.5 0 006.15-3.35z" />
      </svg>
    </div>

    <!-- Category Filters -->
    <div class="flex gap-3 mt-4 overflow-x-auto pb-1">
      <button class="px-4 py-2 rounded-xl bg-blue-100 text-blue-700 shadow-sm hover:shadow-md transition">
        All
      </button>

      <button class="px-4 py-2 rounded-xl bg-gray-100 text-gray-600 shadow-sm hover:bg-gray-200 hover:shadow-md transition">
        Starters
      </button>

      <button class="px-4 py-2 rounded-xl bg-gray-100 text-gray-600 shadow-sm hover:bg-gray-200 hover:shadow-md transition">
        Mains
      </button>

      <button class="px-4 py-2 rounded-xl bg-gray-100 text-gray-600 shadow-sm hover:bg-gray-200 hover:shadow-md transition">
        Sides
      </button>

      <button class="px-4 py-2 rounded-xl bg-gray-100 text-gray-600 shadow-sm hover:bg-gray-200 hover:shadow-md transition">
        Beverages
      </button>
    </div>

    <!-- In-built Food Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-6">

      {% for item in builtin_foods %}
      <div class="bg-white border rounded-xl shadow-sm p-4 
                  hover:shadow-lg hover:-translate-y-1 transition-all duration-300">

          <div class="overflow-hidden rounded-lg">
            <img src="{% if item.picture %}{{ item.picture.url }}{% else %}#{% endif %}"
                 class="h-32 w-full object-cover rounded-lg transition-transform duration-300 hover:scale-105">
          </div>

          <h3 class="mt-3 font-semibold text-gray-800">{{ item.title }}</h3>
          <p class="text-sm text-gray-500">{{ item.description|truncatewords:20 }}</p>

          <button 
            class="mt-4 w-full bg-blue-100 text-blue-700 rounded-xl py-2 font-medium 
                   hover:bg-blue-200 hover:shadow-md active:scale-95 transition-all"
            hx-post="{% url 'tap_add_inbuilt_menu_item' item.pk %}"
            hx-target="#menu-table-body"
            hx-swap="innerHTML"
            hx-CSRFToken="{{ csrf_token }}"
          >
            Tap to Add
          </button>

      </div>
      {% endfor %}

    </div>
  </div>


  <!-- SECOND SEARCH + CATEGORIES -->
  <div class="flex flex-col md:flex-row items-center justify-between gap-4">

    <div class="relative w-full md:w-1/2 group">
      <input 
        type="text"
        placeholder="Search menu items..."
        class="w-full rounded-xl border border-gray-300 pl-10 py-2 shadow-sm
               focus:ring-2 focus:ring-blue-500 focus:outline-none
               transition-all duration-200 group-hover:shadow-md"
        hx-get="{% url 'menu_search' %}"
        hx-trigger="input changed delay:400ms"
        hx-target="#menu-table-body"
        hx-swap="innerHTML"
      >
      <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5 group-hover:opacity-80 transition" 
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-4.35-4.35m0 0A7.5 7.5 7.5 7.5 0 1010.5 18a7.5 7.5 0 006.15-3.35z" />
      </svg>
    </div>

    <div class="flex flex-wrap gap-3">
      <button class="px-4 py-2 rounded-xl bg-blue-100 text-blue-700 shadow-sm hover:shadow-md transition">
        All Categories
      </button>

      {% for cat in categories %}
      <button 
        class="px-4 py-2 rounded-xl bg-gray-100 text-gray-600 shadow-sm 
               hover:bg-gray-200 hover:shadow-md transition"
        hx-get="{% url 'menu_filter' cat.slug %}"
        hx-target="#menu-table-body"
        hx-swap="innerHTML"
      >
        {{ cat.name }}
      </button>
      {% endfor %}
    </div>

  </div>

  <!-- MAIN MENU TABLE -->
  <div class="bg-white rounded-2xl border overflow-hidden shadow-xl">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="py-3 px-4 text-sm font-medium text-gray-700">Item</th>
          <th class="py-3 px-4 text-sm font-medium text-gray-700">Category</th>
          <th class="py-3 px-4 text-sm font-medium text-gray-700">Price</th>
          <th class="py-3 px-4 text-sm font-medium text-gray-700">Status</th>
          <th class="py-3 px-4 text-sm font-medium text-gray-700 text-center">Actions</th>
        </tr>
      </thead>

      <tbody id="menu-table-body">
        {% include 'admin_templates/partials/menu-forms/manage_menu_rows.html' %}
      </tbody>

    </table>
  </div>
</div>


<!-- Sticky bar transparency effect -->
<script>
  const bar = document.getElementById("top-search-bar");

  if (bar) {
    window.addEventListener("scroll", () => {
      const y = window.scrollY;

      if (y > 20) {
        bar.classList.add("bg-white/70", "shadow-md");
        bar.classList.remove("bg-white/10");
      } else {
        bar.classList.remove("bg-white/70", "shadow-md");
        bar.classList.add("bg-white/10");
      }
    });
  }
</script>
