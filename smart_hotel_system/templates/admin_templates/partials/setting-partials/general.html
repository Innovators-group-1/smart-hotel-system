<form class="space-y-4" hx-post="{% url 'update_general_settings' %}" hx-target="#general-settings-body" hx-swap="outerHTML" hx-on:htmx:afterRequest="if(event.detail.xhr.status === 200) {htmx.trigger('#sidebar-hotel-name','settingsUpdated');}">
  {% csrf_token %}
  <div>
    <label class="block font-medium text-gray-700">Hotel/Restaurant Name</label>
    <input type="text" name="name" value = "{{hotel_settings.hotel_name |default:'Smart Hotel'}}" 
           class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label class="block font-medium text-gray-700">Contact Email</label>
    <input type="email" name="email" placeholder="info@smarthotel.com" value="{{hotel_settings.contact_email |default:'info@smarthotel.com'}}"
           class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label for="address" class="block font-medium text-gray-700">Address</label>
    <input type="text" name="address" value="{{hotel_settings.address |default:''}}" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block font-medium text-gray-700">Phone Number</label>
      <input type="text" name="phone" placeholder="+254 700 000 000" value="{{hotel_settings.contact_phone |default:'+254 700 000 000'}}"
             class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="block font-medium text-gray-700">Business Hours</label>
      <input type="text" name="hours" placeholder="Mon–Sun: 8AM–10PM" value="{{hotel_settings.opening_time |default:'Mon–Sun: 8AM–10PM'}}"
             class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
    </div>
  </div>
  <div>
    <label class="block font-medium text-gray-700">Logo Upload</label>
    <input type="file" name="logo" class="w-full border rounded-lg px-3 py-2" />
  </div>
  <button class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">Save</button>
</form>
