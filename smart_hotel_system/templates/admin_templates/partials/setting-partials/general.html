<form class="space-y-4" hx-post="{% url 'update_general_settings' %}" hx-target="#general-settings-body" hx-swap="outerHTML" hx-on:htmx:afterRequest="if(event.detail.xhr.status === 200) {htmx.trigger('#sidebar-hotel-name','settingsUpdated');}">
  {% csrf_token %}
  <div>
    <label class="block font-medium text-gray-700">Hotel/Restaurant Name</label>
        <input type="text" name="name" value = "{% if hotel_settings.hotel_name %}{{ hotel_settings.hotel_name }}{% else %}Smart Hotel{% endif %}" 
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label class="block font-medium text-gray-700">Contact Email</label>
        <input type="email" name="email" placeholder="info@smarthotel.com" value="{% if hotel_settings.contact_email %}{{ hotel_settings.contact_email }}{% else %}info@smarthotel.com{% endif %}"
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label for="address" class="block font-medium text-gray-700">Address</label>
    <input type="text" name="address" value="{% if hotel_settings.address %}{{ hotel_settings.address }}{% else %}{% endif %}" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block font-medium text-gray-700">Phone Number</label>
            <input type="text" name="phone" placeholder="+254 700 000 000" value="{% if hotel_settings.contact_phone %}{{ hotel_settings.contact_phone }}{% else %}+254 700 000 000{% endif %}"
              class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="block font-medium text-gray-700">Business Hours</label>
            <input type="text" name="hours" placeholder="Mon–Sun: 8AM–10PM" value="{% if hotel_settings.opening_time %}{{ hotel_settings.opening_time }}{% else %}Mon–Sun: 8AM–10PM{% endif %}"
              class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500" />
    </div>
  </div>
  <div>
    <label class="block font-medium text-gray-700">Logo Upload</label>
    <input type="file" name="logo" class="w-full border rounded-lg px-3 py-2" />
  </div>
  <button class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">Save</button>
</form>
