{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ hotel_name }}</title>
  <link rel="stylesheet" href="{% static 'dist/output.css' %}">
  <script src="https://unpkg.com/htmx.org@1.9.2"></script>
</head>
<body class="bg-gray-50 text-gray-800 flex min-h-screen">

  {% block content %}

  <!-- Sidebar -->
  <aside class="w-64 lg:w-80 bg-white shadow-md p-4 flex flex-col sticky top-0 h-screen overflow-y-auto">
    <div id="sidebar-hotel-name" class="text-2xl lg:text-3xl font-bold text-blue-600 mb-6" hx-get="{% url 'get_hotel_name' %}" hx-trigger="settingsUpdated,load,every 5s" hx-swap="innerHTML">{{ hotel_name }}</div>
    <nav class="flex-1 space-y-2">
      <button hx-get="{% url 'dashboard_partial' %}" hx-target="#content" hx-swap="innerHTML"
        class="block w-full text-left px-3 py-2 lg:px-4 lg:py-3 rounded hover:bg-blue-100 text-sm lg:text-base">🏠 Dashboard</button>

      <button hx-get="{% url 'orders_partial' %}" hx-target="#content" hx-swap="innerHTML"
        class="block w-full text-left px-3 py-2 lg:px-4 lg:py-3 rounded hover:bg-blue-100 text-sm lg:text-base">📦 Orders</button>

      <button hx-get="{% url 'menu_partial' %}" hx-target="#content" hx-swap="innerHTML"
        class="block w-full text-left px-3 py-2 lg:px-4 lg:py-3 rounded hover:bg-blue-100 text-sm lg:text-base">🍽️ Menu Management</button>

      
      <button hx-get="{% url 'chefs_partial' %}" hx-target="#content" hx-swap="innerHTML"
        class="block w-full text-left px-3 py-2 lg:px-4 lg:py-3 rounded hover:bg-blue-100 text-sm lg:text-base">👨‍🍳 Chef Management</button>

      <button hx-get="{% url 'reports_partial' %}" hx-target="#content" hx-swap="innerHTML"
        class="block w-full text-left px-3 py-2 lg:px-4 lg:py-3 rounded hover:bg-blue-100 text-sm lg:text-base">📊 Reports</button>

      <button hx-get="{% url 'history_partial' %}" hx-target="#content" hx-swap="innerHTML"
        class="block w-full text-left px-3 py-2 lg:px-4 lg:py-3 rounded hover:bg-blue-100 text-sm lg:text-base">📜 History</button>

      <button hx-get="{% url 'settings_partial' %}" hx-target="#content" hx-swap="innerHTML"
        class="block w-full text-left px-3 py-2 lg:px-4 lg:py-3 rounded hover:bg-blue-100 text-sm lg:text-base">⚙️ Settings</button>
    </nav>
    <div class="mt-auto">
      <a href="#" class="block text-red-500 hover:underline text-sm lg:text-base">Logout</a>
    </div>
  </aside>

  <!-- Content Area -->
  <main id="content" class="flex-1 p-6 lg:p-8 overflow-y-auto ml-64 lg:ml-80">
    {% include 'admin_templates/partials/dashboard.html' %}
  </main>
  
  {% endblock %}
  <!-- Global Modal Overlay -->
  <div 
    id="modal"
    class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 
          overflow-y-auto p-6"
    onclick="if(event.target.id === 'modal'){ closeModal(); }"
  >
    <div 
      id="modal-content"
      class="mx-auto mt-10 w-full max-w-lg bg-white rounded-2xl shadow-xl 
             max-h-[90vh] overflow-y-auto p-6"
      hx-target="this"
      hx-swap="innerHTML"
    ></div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="fixed top-4 right-4 space-y-3 z-50"></div>
  <!-- Global Scripts -->
   <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  function openModal() {
    const modal = document.getElementById('modal');
    if (modal) {
      modal.classList.remove('hidden');
    }
  }
  function closeModal() {
    const modal = document.getElementById('modal');
    if (modal) {
      modal.classList.add('hidden');
    }
    const modalContent = document.getElementById('modal-content');
    if (modalContent) {
      modalContent.innerHTML = "";
    }
  }

  // HTMX event listeners for toast notifications
  function showToast(message, type="error") {
    let toast = document.createElement("div");
    toast.className = `
        px-4 py-3 rounded-xl shadow-lg text-white 
        ${type === "error" ? "bg-red-600" : "bg-green-600"}
        animate-slide-in
    `;
    toast.innerText = message;

    document.getElementById("toast-container").appendChild(toast);

    setTimeout(() => {
        toast.classList.add("opacity-0");
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
  document.body.addEventListener('toast-error',(e)=>{
    showToast(e.detail.message,'error');
  })

  document.body.addEventListener('toast-success',(e)=>{
    showToast(e.detail.message,'success');
  })

  // Set CSRF header for all HTMX requests using the csrftoken cookie
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  document.body.addEventListener('htmx:configRequest', function(event) {
    const csrftoken = getCookie('csrftoken');
    if (csrftoken) {
      event.detail.headers['X-CSRFToken'] = csrftoken;
    }
  });
</script>
<style>
@keyframes slide-in {
    from { transform: translateX(50px); opacity: 0 }
    to   { transform: translateX(0); opacity: 1 }
}
.animate-slide-in {
    animation: slide-in .25s ease-out;
}
</style>

</body>
</html>
