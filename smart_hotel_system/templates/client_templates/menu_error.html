<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDine - Access Error</title>
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body>
    <div class="container error-container">
        <div class="error-content">
            <h1>🚫 Access Denied</h1>
            <p>Invalid table access. Please scan a valid QR code to access the menu.</p>
            <div class="error-actions">
                <button onclick="window.history.back()" class="btn-primary">Go Back</button>
                <button onclick="window.location.href='/'" class="btn-secondary">Home</button>
            </div>
        </div>
    </div>
</body>
</html>
