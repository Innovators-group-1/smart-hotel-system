<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Smart Hotel{% endblock %}</title>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-[#FAF7F2] text-gray-900">
    {% block content %}{% endblock %}
    <!-- Global Modal Container -->
        <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
                <!-- HTMX will swap seat selector content here --> 
        </div>
        <script>
            document.body.addEventListener('cartChanged', function(evt) {
                try {
                    const newValue = evt.detail;
                    const el = document.getElementById('cart-count');
                    if (!el) return;
                    let value = newValue;
                    if (value && typeof value === 'object') {
                        const keys = Object.keys(value);
                        if (keys.length > 0) {
                            const k = keys[0];
                            value = value[k];
                        }
                    }

                    el.textContent = String(value || 0);
                    if (value > 0) {
                        el.classList.remove('hidden');
                    } else {
                        el.classList.add('hidden');
                    }
                } catch (e) {
                    console.warn('Failed to update cart count', e);
                }
            });
            // Grab CSRF token from cookie
            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                    }
                }
                }
                return cookieValue;
            }
            const csrftoken = getCookie('csrftoken');

            // Attach CSRF token to all HTMX requests
            document.body.addEventListener('htmx:configRequest', (event) => {
                event.detail.headers['X-CSRFToken'] = csrftoken;
            });
        </script>
</body>
</html>
