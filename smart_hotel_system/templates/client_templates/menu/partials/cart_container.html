<section id="cart-container" class="space-y-4 mb-6">
  {% include "client_templates/menu/partials/cart_section.html" %}
  <section class="bg-white rounded-2xl shadow-sm px-4 py-4 mb-5">
    <h2 class="text-sm font-semibold text-slate-900 mb-3">Order Summary</h2>

    <div class="flex items-center justify-between text-sm mb-2">
      <span class="text-slate-500">Subtotal</span>
      <span class="font-medium text-slate-900">Ksh {{ total }}</span>
    </div>

    <div class="flex items-center justify-between text-sm mb-2">
      <span class="text-slate-500">Taxes &amp; Fees</span>
      <span class="font-medium text-slate-900">Included</span>
    </div>

    <div class="border-t border-slate-100 mt-2 pt-2 flex items-center justify-between">
      <span class="text-sm font-semibold text-slate-900">Grand Total</span>
      <span class="text-base font-semibold text-slate-900">Ksh {{ total }}</span>
    </div>
  </section>
</section>
