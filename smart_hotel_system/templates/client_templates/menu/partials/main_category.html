<!-- Main Categories Navigation -->
<nav class="bg-white pt-3 pb-2 border-b border-slate-100">
  <div class="max-w-md mx-auto px-4">
    <div class="flex gap-2 overflow-x-auto no-scrollbar">
      {% for main in main_categories %}
        {% if main.main_category_id %}
        <button
          type="button"
          class="whitespace-nowrap px-3 py-1.5 rounded-full text-sm
                 {% if main.main_category_id == selected_main %}
                   bg-slate-100 text-slate-700
                 {% else %}
                   bg-orange-500 text-white
                 {% endif %}"
          hx-get="{% url 'client_flow:load_subcategories' main.main_category_id %}"
          hx-target="#subcategories"
          hx-swap="innerHTML"
        >
          {{ main.name }}
        </button>
        {% endif %}
      {% endfor %}
    </div>
  </div>
</nav>
