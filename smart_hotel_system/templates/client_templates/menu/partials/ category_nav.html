<nav class="bg-white pt-3 pb-2 border-b border-slate-100">
  <div class="max-w-md mx-auto px-4">
    <div class="flex gap-2 overflow-x-auto no-scrollbar">
      {% for category in categories %}
        <button
          type="button"
          class="whitespace-nowrap px-3 py-1.5 rounded-full text-sm
                 {% if selected_category == category.id %}
                   bg-orange-500 text-white
                 {% else %}
                   bg-slate-100 text-slate-700
                 {% endif %}"
          hx-get="{% url 'client_flow:menu' %}?category={{ category.id }}{% if query %}&q={{ query }}{% endif %}"
          hx-target="#menu-content"
          hx-swap="innerHTML"
        >
          {{ category.name }}
        </button>
      {% endfor %}
    </div>
  </div>
</nav>
