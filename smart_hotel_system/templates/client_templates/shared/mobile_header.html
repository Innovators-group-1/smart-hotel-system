<header class="sticky top-0 z-50 bg-[#fffaf6]">

    <!-- TOP BAR -->
    <div class="flex items-center justify-between px-4 py-3">

        <!-- LEFT: LOGO + NAME -->
        <div class="flex items-center gap-2">
            <!-- Logo Icon -->
            <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" stroke-width="2"
                 viewBox="0 0 24 24">
                <path d="M3 3h18l-2 9H5L3 3z"></path>
                <path d="M16 16a2 2 0 11-4 0"></path>
                <path d="M8 16a2 2 0 11-4 0"></path>
            </svg>

            <!-- App / Hotel Name -->
            <span 
                class="text-lg font-semibold text-gray-900" 
                hx_get="{% url 'client_flow:hotel_name' %}"
                hx_swap="outerHTML"
                hx_target="this"
                hx_trigger="every 5s">
                Smart Hotel
            </span>
        </div>

        <!-- RIGHT: CART ICON -->
        <a href="{% url 'client_flow:cart' %}" class="relative">

            <!-- Cart Icon -->
            <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" stroke-width="2"
                 viewBox="0 0 24 24">
                <path d="M3 3h2l.4 2M7 13h10l4-8H5.4"></path>
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
            </svg>

                {% with request.session.cart as cart %}
                <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-500 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full {% if not cart or cart|length == 0 %}hidden{% endif %}">
                    {{ cart|length|default:0 }}
                </span>
                {% endwith %}
        </a>
    </div>

    <!-- SEARCH BAR -->
    <div class="px-4 pb-3">
        <form hx_get="{% url 'client_flow:menu_search' %}" hx_target="#menu-items" hx_swap="innerHTML" class="mb-0">
            <div class="relative">
                <!-- Search Icon -->
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                    🔍
                </span>

                <!-- Input -->
                <input
                    type="text"
                    name="q"
                    placeholder="Search for food..."
                    value="{{ query }}"
                    class="w-full pl-10 pr-4 py-3 rounded-xl bg-[#f6ede7]
                           focus:outline-none focus:ring-2 focus:ring-orange-400"
                />
            </div>
        </form>
    </div>

</header>
