name: Smart Hotel System CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: quickdine-489018
  REGION: us-central1
  SERVICE: quickdine
  IMAGE: us-central1-docker.pkg.dev/quickdine-489018/quickdine/quickdine

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r smart_hotel_system/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies and build CSS
        run: |
          cd smart_hotel_system
          npm ci
          npx tailwindcss -i ./static/src/input.css -o ./static/dist/output.css --minify

      # Uncomment when you have tests ready
      # - name: Run Python tests
      #   run: |
      #     cd smart_hotel_system
      #     python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/911875118580/locations/global/workloadIdentityPools/quickdine-github-pool/providers/github-provider
          service_account: github-actions@quickdine-489018.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        run: |
          docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest -f docker/Dockerfile .
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update $SERVICE \
            --image=$IMAGE:$GITHUB_SHA \
            --region=$REGION \
            --project=$PROJECT_ID